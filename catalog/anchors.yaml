# catalog/anchors.yaml
# Measured calibration anchors. Each anchor lets the roofline back out a real MFU / bandwidth
# efficiency for a (model, gpu, dtype, isl, concurrency) point, which upgrades confidence from
# DEFAULT (pure theory) toward HIGH for nearby scenarios. Phase 3's ingest_anchor.py appends new
# rows from completed results/real/*.json and backfills derived_mfu_prefill.
#
# Seeded from the real L4 + Llama-3.1-8B-FP8 validation run (BENCHMARK_FINDINGS.md).
# osl = 128 (harness default for those runs).
#
# Optional fields (not written by ingest_anchor.py — set manually for special benchmarks):
#   max_num_seqs        (int)   scheduler batch cap applied during the run
#   prefix_cache_hit_rate (float, 0.0–1.0) observed KV-cache hit rate
#   effective_isl       (int)   tokens actually processed = isl × (1 – hit_rate);
#                               use this for MFU back-calculation when prefix caching is active
#   concurrency         (float) average in-flight requests per GPU; sub-1 values valid for
#                               per-replica derived rows from multi-replica system totals

- model: llama-3.1-8b
  gpu: l4
  dtype: fp8
  isl: 512
  osl: 128
  concurrency: 10
  measured_ttft_p50_ms: 75
  measured_ttft_p95_ms: 81
  measured_throughput_tok_s: 262
  derived_mfu_prefill: null            # Phase 3 backfills
  source: "BENCHMARK_FINDINGS.md — ISL=512 c=10"

