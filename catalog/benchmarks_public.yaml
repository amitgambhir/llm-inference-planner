# catalog/benchmarks_public.yaml
# Citable public benchmark points for fitting and validating efficiency curves.
#
# TWO TABLE POLICY:
#   benchmarks_public.yaml  -- public MLPerf/vendor points, ships with repo,
#                              used by validate.fit() to tune efficiency_constants.yaml
#   anchors.yaml            -- user's own optional per-deployment measurements
#   Never conflate them. This file grounds the defaults; anchors.yaml refines them.
#
# ENGINE CONFOUND POLICY (read before adding points):
#   Different engines realize different fractions of peak for the SAME hardware.
#   We model this with a per-engine `engine_factor` (in efficiency_constants.yaml),
#   with vLLM as the reference engine (factor = 1.0). Therefore:
#     engine: vllm   -> fit_role: level   (pins the absolute LEVEL; this is the deploy target)
#     engine: trtllm -> fit_role: shape   (TRT-LLM is internally consistent across ISL, so it
#                                          pins the SHAPE of f_isl/f_size; its LEVEL is absorbed
#                                          by engine_factor[trtllm], NOT applied to vLLM predictions)
#       ambiguous engine -> fit_role: sanity (excluded from fit; sanity check only)
#   A user prediction is ALWAYS made at their actual runtime's engine_factor. Never report a
#   TRT-LLM-level number for a vLLM deployment.
#
#   `engine_version` matters too (vLLM 0.6 was ~2.7x faster than 0.5). Record it; the fit may
#   down-weight stale versions.
#
# metric field:
#   total_output_tps       : aggregate OUTPUT tokens/sec for the (tp, batch) config described
#   per_user_decode_tps    : aggregate decode tps / concurrent batch (weight-amortization signal)
#   agg_throughput_tps_per_gpu : total output tps / GPU count (legacy MLPerf-cluster numbers only)
#
# scenario field:
#   offline : max-throughput run, no latency constraint; batch=null -> max_concurrent_seqs
#   server  : Poisson arrivals under a TTFT/TPOT SLO
#   latency : specific batch configuration with stated ISL/OSL
#
# fit_role: level | shape | sanity   (see engine policy above)

schema_version: 2

points:

