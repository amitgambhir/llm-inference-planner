  # ---------------------------------------------------------------------------

  # -- Red Hat MLPerf v5.1 -- Llama-3.1-8B-FP8, single GPU, vLLM 0.10.0 ------
  # CNN-DailyMail subset: mean ISL 778, mean OSL 73. Offline + Server scenarios.
