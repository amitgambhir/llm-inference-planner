    gpu: h100_sxm
    dtype: fp8
    tp: 1
    isl: 778
    osl: 73
    batch: null
    scenario: offline
    metric: total_output_tps
    measured: 5777
    engine: vllm
    engine_version: "0.10.0"
    fit_role: level
    dataset: distribution
